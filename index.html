<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberPrep Pro — CEH & CNSP Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ===== ROOT VARIABLES ===== */
:root {
  --bg: #050a0e;
  --bg2: #080f15;
  --bg3: #0d1820;
  --card: rgba(13, 24, 32, 0.8);
  --green: #00ff88;
  --cyan: #00d4ff;
  --purple: #a855f7;
  --orange: #ff6b35;
  --yellow: #f59e0b;
  --red: #ff4444;
  --text: #e0f0ff;
  --text-dim: #7a9ab5;
  --border: rgba(0, 255, 136, 0.15);
  --border-bright: rgba(0, 255, 136, 0.4);
  --glow: 0 0 20px rgba(0, 255, 136, 0.3);
  --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-w: 260px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ===== TYPOGRAPHY ===== */
h1, h2, h3 { font-family: 'Orbitron', monospace; letter-spacing: 0.05em; }
.mono { font-family: 'Share Tech Mono', monospace; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }

/* ===== PAGE SYSTEM ===== */
.page { display: none; }
.page.active { display: flex; flex-direction: column; }
#app { position: relative; z-index: 1; }

/* ===== LANDING PAGE ===== */
#landing {
  min-height: 100vh;
  background: radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.06) 0%, transparent 50%);
  display: flex;
  flex-direction: column;
}

.landing-nav {
  padding: 24px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Orbitron', monospace;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--green);
}

.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: var(--bg);
}

.landing-hero {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 80px 24px;
  gap: 32px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,255,136,0.1);
  border: 1px solid var(--border-bright);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 0.85rem;
  color: var(--green);
  letter-spacing: 0.1em;
  font-family: 'Share Tech Mono', monospace;
  animation: pulse-border 2s ease infinite;
}

@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(0,255,136,0); }
}

.hero-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 900;
  line-height: 1.1;
  background: linear-gradient(135deg, var(--text) 0%, var(--green) 50%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: 1.2rem;
  color: var(--text-dim);
  max-width: 600px;
  line-height: 1.6;
}

.hero-stats {
  display: flex;
  gap: 48px;
  flex-wrap: wrap;
  justify-content: center;
}

.hero-stat { text-align: center; }
.hero-stat-num {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 900;
  color: var(--green);
}
.hero-stat-label { font-size: 0.85rem; color: var(--text-dim); }

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ===== BUTTONS ===== */
.btn {
  padding: 12px 28px;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  transition: var(--transition);
  letter-spacing: 0.05em;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  transform: translateX(-100%);
  transition: transform 0.3s;
}
.btn:hover::before { transform: translateX(0); }

.btn-primary {
  background: var(--green);
  color: var(--bg);
  box-shadow: 0 0 20px rgba(0,255,136,0.4);
}
.btn-primary:hover { box-shadow: 0 0 30px rgba(0,255,136,0.6); transform: translateY(-2px); }

.btn-secondary {
  background: transparent;
  color: var(--green);
  border: 1px solid var(--green);
}
.btn-secondary:hover { background: rgba(0,255,136,0.1); }

.btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: var(--green); color: var(--green); }

.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { box-shadow: 0 0 20px rgba(255,68,68,0.4); transform: translateY(-2px); }

.btn-sm { padding: 7px 16px; font-size: 0.85rem; }
.btn-xs { padding: 4px 10px; font-size: 0.78rem; }
.btn-icon { padding: 10px; border-radius: 6px; }

.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn:disabled:hover { transform: none; }

/* ===== CARDS ===== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  backdrop-filter: blur(10px);
  transition: var(--transition);
}
.card:hover { border-color: var(--border-bright); box-shadow: var(--glow); }

.glass {
  background: rgba(13, 24, 32, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 12px;
}

/* ===== AUTH FORMS ===== */
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(ellipse at 50% 50%, rgba(0,255,136,0.05) 0%, transparent 70%);
}

.auth-card {
  width: 100%;
  max-width: 440px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  backdrop-filter: blur(20px);
}

.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}

.auth-logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  color: var(--bg);
  margin: 0 auto 16px;
  box-shadow: 0 0 30px rgba(0,255,136,0.3);
}

.auth-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem;
  color: var(--green);
  text-align: center;
  margin-bottom: 8px;
}

.auth-subtitle { color: var(--text-dim); font-size: 0.9rem; text-align: center; }

/* ===== FORM ELEMENTS ===== */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.form-input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  transition: var(--transition);
  outline: none;
}

.form-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(0,255,136,0.15);
}

.form-input::placeholder { color: rgba(120, 154, 181, 0.5); }

textarea.form-input { resize: vertical; min-height: 100px; }
select.form-input { cursor: pointer; }
select.form-input option { background: var(--bg3); }

/* ===== APP LAYOUT ===== */
#app-layout {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: var(--transition);
}

.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  color: var(--bg);
  flex-shrink: 0;
}

.sidebar-logo-text {
  font-family: 'Orbitron', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--green);
  line-height: 1.2;
}

.sidebar-logo-sub { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.1em; }

.sidebar-user {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  flex-shrink: 0;
  border: 2px solid var(--border-bright);
}

.user-info { overflow: hidden; }
.user-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 0.72rem; color: var(--green); font-family: 'Share Tech Mono', monospace; }

.sidebar-nav { padding: 12px 0; flex: 1; overflow-y: auto; }

.nav-section-title {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 12px 20px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 20px;
  color: var(--text-dim);
  cursor: pointer;
  transition: var(--transition);
  border-left: 3px solid transparent;
  font-size: 0.95rem;
  font-weight: 500;
  user-select: none;
}

.nav-item:hover {
  color: var(--text);
  background: rgba(0,255,136,0.05);
  border-left-color: rgba(0,255,136,0.3);
}

.nav-item.active {
  color: var(--green);
  background: rgba(0,255,136,0.08);
  border-left-color: var(--green);
}

.nav-item i { width: 18px; text-align: center; font-size: 0.9rem; }

.nav-badge {
  margin-left: auto;
  background: var(--green);
  color: var(--bg);
  border-radius: 100px;
  padding: 1px 7px;
  font-size: 0.7rem;
  font-weight: 700;
}

.sidebar-bottom {
  padding: 16px;
  border-top: 1px solid var(--border);
}

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.top-bar {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}

.page-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  color: var(--green);
}

.breadcrumb { font-size: 0.85rem; color: var(--text-dim); }
.breadcrumb span { color: var(--green); }

.content-area { padding: 32px; flex: 1; }

/* ===== DASHBOARD ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

.stat-card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: var(--glow); }

.stat-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  margin-bottom: 16px;
}

.stat-label { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.stat-value { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 700; line-height: 1; }
.stat-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

/* ===== PROGRESS BAR ===== */
.progress-bar-wrap {
  background: rgba(0,0,0,0.4);
  border-radius: 100px;
  overflow: hidden;
  height: 8px;
}

.progress-bar {
  height: 100%;
  border-radius: 100px;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 10px rgba(0,255,136,0.5);
  position: relative;
}

.progress-bar::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 20px; height: 100%;
  background: rgba(255,255,255,0.3);
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { opacity: 0; transform: translateX(-10px); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateX(10px); }
}

.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-label { font-size: 0.9rem; color: var(--text-dim); }
.progress-pct { font-family: 'Orbitron', monospace; font-size: 0.9rem; color: var(--green); font-weight: 700; }

/* ===== PLAN CARDS ===== */
.plans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

.plan-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.plan-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(0,255,136,0.05), transparent 60%);
  pointer-events: none;
}

.plan-card:hover {
  border-color: var(--border-bright);
  box-shadow: var(--glow);
  transform: translateY(-4px);
}

.plan-card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }

.plan-icon {
  width: 52px; height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.plan-icon.ceh { background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,212,255,0.2)); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
.plan-icon.cnsp { background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(0,212,255,0.2)); color: var(--purple); border: 1px solid rgba(168,85,247,0.3); }
.plan-icon.custom { background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(245,158,11,0.2)); color: var(--orange); border: 1px solid rgba(255,107,53,0.3); }

.plan-name { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; }
.plan-desc { font-size: 0.85rem; color: var(--text-dim); margin-top: 2px; }

.plan-stats { display: flex; gap: 20px; margin-bottom: 16px; }
.plan-stat-item { text-align: center; }
.plan-stat-num { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 700; color: var(--green); }
.plan-stat-lbl { font-size: 0.72rem; color: var(--text-dim); }

/* ===== TOPIC LIST ===== */
.topic-list { display: flex; flex-direction: column; gap: 10px; }

.topic-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 16px;
}

.topic-item:hover { border-color: var(--border-bright); background: rgba(13,24,32,0.95); }
.topic-item.completed { border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.05); }
.topic-item.in-progress { border-color: rgba(245,158,11,0.4); }

.topic-day {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  min-width: 50px;
  flex-shrink: 0;
}

.topic-status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot-notstarted { background: var(--text-dim); }
.status-dot-inprogress { background: var(--yellow); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
.status-dot-completed { background: var(--green); box-shadow: 0 0 8px rgba(0,255,136,0.5); }

.topic-info { flex: 1; min-width: 0; }
.topic-title-text { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topic-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

.topic-progress-mini { width: 80px; flex-shrink: 0; }
.topic-pct { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: var(--green); text-align: right; margin-bottom: 4px; }

.topic-checks { display: flex; gap: 6px; flex-shrink: 0; }
.check-icon { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; }
.check-done { background: rgba(0,255,136,0.2); color: var(--green); border: 1px solid var(--green); }
.check-pending { background: rgba(0,0,0,0.3); color: var(--text-dim); border: 1px solid var(--border); }

/* ===== TOPIC DETAIL ===== */
.topic-detail {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 24px;
}

@media (max-width: 1100px) { .topic-detail { grid-template-columns: 1fr; } }

.subtopics-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

.subtopic-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
}

.subtopic-item:hover { border-color: var(--border-bright); background: rgba(0,255,136,0.03); }
.subtopic-item.done { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.3); }

.subtopic-checkbox {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 2px solid var(--border-bright);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.subtopic-item.done .subtopic-checkbox {
  background: var(--green);
  border-color: var(--green);
  color: var(--bg);
  font-size: 0.7rem;
}

.subtopic-text { font-size: 0.95rem; }
.subtopic-item.done .subtopic-text { text-decoration: line-through; color: var(--text-dim); }

/* ===== SECTION HEADERS ===== */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.9rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title i { color: var(--green); }

/* ===== VIDEO LINKS ===== */
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.video-item {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);

function $(id) { return document.getElementById(id); }

function showLoader() { $('loader').style.display = 'flex'; }
function hideLoader() { $('loader').style.display = 'none'; }

function toast(msg, type = 'info', duration = 3500) {
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<i class="fas ${icons[type]} toast-icon"></i><span>${msg}</span>`;
  el.onclick = () => el.remove();
  $('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

async function api(method, endpoint, body) {
  const token = localStorage.getItem('cp_token');
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + endpoint, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function getYouTubeId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function formatDate(d) {
  if (!d) return 'N/A';
  return new Date(d).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB', 'warning'); return; }

  try {
    const form = new FormData();
    form.append('avatar', file);
    const token = localStorage.getItem('cp_token');
    const res = await fetch('/api/auth/avatar', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: form
    });
    if (!res.ok) throw new Error('Upload failed');
    const data = await res.json();
    
    // Update display
    const display = $('avatarDisplay');
    display.innerHTML = `<img src="${data.avatar_url}" style="width:100%;height:100%;object-fit:cover">`;
    
    // Update sidebar avatar
    updateSidebarAvatar();
    toast('Profile photo updated!', 'success');
  } catch(e) {
    toast('Upload failed: ' + e.message, 'error');
  }
}

async function updateAvatarColor(color) {
  try {
    await api('PUT', '/auth/profile', { avatar_color: color });
    // Update color circles border
    document.querySelectorAll('[onclick^="updateAvatarColor"]').forEach(el => {
      el.style.border = el.getAttribute('onclick').includes(color) ? '2px solid white' : '2px solid transparent';
    });
    // Update sidebar avatar
    updateSidebarAvatar();
    toast('Color updated!', 'success');
  } catch(e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function saveProfile() {
  const name = $('profileName').value.trim();
  const email = $('profileEmail').value.trim();
  if (!name || !email) { toast('Name and email required', 'warning'); return; }

  try {
    await api('PUT', '/auth/profile', { name, email });
    currentUser.name = name;
    currentUser.email = email;
    updateSidebarAvatar();
    toast('Profile updated!', 'success');
  } catch(e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function changePassword() {
  const current = $('currentPwd').value;
  const newP = $('newPwd').value;
  const confirm = $('confirmPwd').value;

  if (!current || !newP || !confirm) { toast('Fill all password fields', 'warning'); return; }
  if (newP !== confirm) { toast('New passwords do not match', 'error'); return; }
  if (newP.length < 6) { toast('Password must be at least 6 characters', 'warning'); return; }

  try {
    await api('PUT', '/auth/password', { current_password: current, new_password: newP });
    $('currentPwd').value = '';
    $('newPwd').value = '';
    $('confirmPwd').value = '';
    toast('Password changed successfully!', 'success');
  } catch(e) {
    toast('Failed: ' + e.message, 'error');
  }
}

          <button class="btn btn-ghost btn-sm" onclick="showAddTopicModal(${plan.id})"><i class="fas fa-plus"></i> Add Topic</button>
        </div>
      </div>
      
      <div class="card mb-24">
        <div class="progress-header mb-12">
          <span class="section-title"><i class="fas fa-chart-line"></i> Plan Progress</span>
          <span class="progress-pct">${plan.progress}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="planProgressBar" style="width:0%"></div>
        </div>
      </div>
      
      <div class="topic-list" id="topicList">
        ${topics.length === 0 ? 
          `<div class="empty-state"><i class="fas fa-list"></i><h3>No topics yet</h3><button class="btn btn-primary mt-16" onclick="showAddTopicModal(${plan.id})"><i class="fas fa-plus"></i> Add First Topic</button></div>` :
          topics.map(renderTopicItem).join('')
        }
      </div>
    `;
    
    setTimeout(() => {
      const bar = $('planProgressBar');
      if (bar) bar.style.width = plan.progress + '%';
    }, 100);
    
  } catch (e) {
    $('contentArea').innerHTML = `<div class="empty-state"><i class="fas fa-bug"></i><h3>Error loading plan</h3><p>${e.message}</p></div>`;
  }
}

function renderTopicItem(t) {
  const statusClass = t.status === 'Completed' ? 'completed' : t.status === 'In Progress' ? 'in-progress' : '';
  const dotClass = t.status === 'Completed' ? 'status-dot-completed' : t.status === 'In Progress' ? 'status-dot-inprogress' : 'status-dot-notstarted';
  const completedSubs = (t.subtopics || []).filter(s => s.done).length;
  
  return `
    <div class="topic-item ${statusClass}" onclick="openTopic(${t.id})">
      <div class="topic-day mono">DAY ${t.day_number}</div>
      <div class="topic-status-dot ${dotClass}"></div>
      <div class="topic-info">
        <div class="topic-title-text">${t.topic_title}</div>
        <div class="topic-meta">${completedSubs}/${t.subtopics.length} subtopics · ${t.status}</div>
      </div>
      <div class="topic-progress-mini">
        <div class="topic-pct">${t.progress_percentage}%</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${t.progress_percentage}%;height:4px"></div>
        </div>
      </div>
      <div class="topic-checks">
        <div class="check-icon ${t.tryhackme_done ? 'check-done' : 'check-pending'}" title="TryHackMe">TH</div>
        <div class="check-icon ${t.hackviser_done ? 'check-done' : 'check-pending'}" title="Hackviser">HV</div>
      </div>
      <i class="fas fa-chevron-right text-dim text-sm"></i>
    </div>
  `;
}

// ===================================================================
// TOPIC INTERACTIONS
// ===================================================================

async function toggleSubtopic(topicId, index) {
  try {
    const t = await api('GET', `/topics/${topicId}`);
    t.subtopics[index].done = !t.subtopics[index].done;
    const result = await api('PUT', `/topics/${topicId}`, { subtopics: t.subtopics });
    
    if (result.isCompleted) {
      triggerCompletion(t, result.completedAt);
    } else {
      // Refresh topic detail
      const updated = await api('GET', `/topics/${topicId}`);
      renderTopicDetail(updated);
    }
  } catch (e) { toast('Failed to update: ' + e.message, 'error'); }
}

async function addSubtopic(topicId) {
  const input = $('newSubInput');
  const text = input.value.trim();
  if (!text) return;
  
  try {
    const t = await api('GET', `/topics/${topicId}`);
    t.subtopics.push({ text, done: false });
    await api('PUT', `/topics/${topicId}`, { subtopics: t.subtopics });
    input.value = '';
    const updated = await api('GET', `/topics/${topicId}`);
    renderTopicDetail(updated);
    toast('Subtopic added!', 'success');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function toggleTracker(topicId, type) {
  try {
    const t = await api('GET', `/topics/${topicId}`);
    const payload = type === 'tryhackme' ? 
      { tryhackme_done: !t.tryhackme_done } : 
      { hackviser_done: !t.hackviser_done };
    
    const result = await api('PUT', `/topics/${topicId}`, payload);
    
    if (result.isCompleted) {
      const updated = await api('GET', `/topics/${topicId}`);
      triggerCompletion(updated, result.completedAt);
    } else {
      const updated = await api('GET', `/topics/${topicId}`);
      renderTopicDetail(updated);
    }
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function saveLinks(topicId) {
  const thLink = $('thLink')?.value || '';
  const hvLink = $('hvLink')?.value || '';
  try {
    await api('PUT', `/topics/${topicId}`, { tryhackme_link: thLink, hackviser_link: hvLink });
    toast('Links saved!', 'success');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function addVideo(topicId) {
  const url = $('newVideoInput').value.trim();
  const title = $('newVideoTitle').value.trim();
  if (!url) { toast('Enter a video URL', 'warning'); return; }
  
  try {
    const t = await api('GET', `/topics/${topicId}`);
    t.video_links.push({ url, title: title || url });
    await api('PUT', `/topics/${topicId}`, { video_links: t.video_links });
    $('newVideoInput').value = '';
    $('newVideoTitle').value = '';
    const updated = await api('GET', `/topics/${topicId}`);
    renderTopicDetail(updated);
    toast('Video added!', 'success');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function removeVideo(topicId, index) {
  try {
    const t = await api('GET', `/topics/${topicId}`);
    t.video_links.splice(index, 1);
    await api('PUT', `/topics/${topicId}`, { video_links: t.video_links });
    const updated = await api('GET', `/topics/${topicId}`);
    renderTopicDetail(updated);
    toast('Video removed', 'info');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function uploadPdf(topicId, input) {
  const file = input.files[0];
  if (!file) return;
  
  try {
    const form = new FormData();
    form.append('pdf', file);
    const token = localStorage.getItem('cp_token');
    const res = await fetch(`/api/topics/${topicId}/upload`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: form
    });
    if (!res.ok) throw new Error('Upload failed');
    const updated = await api('GET', `/topics/${topicId}`);
    renderTopicDetail(updated);
    toast('PDF uploaded!', 'success');
  } catch (e) { toast('Upload failed: ' + e.message, 'error'); }
}

async function removePdf(topicId, index) {
  try {
    const t = await api('GET', `/topics/${topicId}`);
    t.pdf_links.splice(index, 1);
    await api('PUT', `/topics/${topicId}`, { pdf_links: t.pdf_links });
    const updated = await api('GET', `/topics/${topicId}`);
    renderTopicDetail(updated);
    toast('PDF removed', 'info');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function deleteTopic(topicId) {
  if (!confirm('Delete this topic? This cannot be undone.')) return;
  try {
    await api('DELETE', `/topics/${topicId}`);
    toast('Topic deleted', 'info');
    navigateToPlan(currentPage === 'ceh' ? 'CEH' : 'CNSP');
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

function editTopicTitle(topicId, currentTitle) {
  const newTitle = prompt('Enter new topic title:', currentTitle);
  if (!newTitle || newTitle === currentTitle) return;
  api('PUT', `/topics/${topicId}`, { topic_title: newTitle })
    .then(() => openTopic(topicId))
    .catch(e => toast('Failed: ' + e.message, 'error'));
}

async function triggerCompletion(topic, completedAt) {
  // Confetti
  launchConfetti();
  
  // Get plan info
  let planName = 'CEH';
  try {
    const allPlans = await api('GET', '/plans');
    const plan = allPlans.find(p => p.id === topic.plan_id);
    if (plan) planName = plan.plan_name;
  } catch {}
  
  // Draw achievement card
  drawAchievementCard({
    dayNumber: topic.day_number,
    topicTitle: topic.topic_title,
    userName: currentUser.name,
    planName,
    date: completedAt || new Date().toISOString()
  });
  
  $('achievementModal').classList.add('open');
  toast('🏆 Day ' + topic.day_number + ' Completed! Achievement unlocked!', 'success', 6000);
  
  // Refresh topic detail
  setTimeout(async () => {
    const updated = await api('GET', `/topics/${topic.id}`);
    renderTopicDetail(updated);
  }, 500);
}

function drawAchievementCard({ dayNumber, topicTitle, userName, planName, date }) {
  const canvas = $('achievement-canvas');
  const ctx = canvas.getContext('2d');
  const W = 480, H = 280;
  canvas.width = W;
  canvas.height = H;
  
  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#050a0e');
  bgGrad.addColorStop(0.5, '#0d1820');
  bgGrad.addColorStop(1, '#050a12');
  ctx.fillStyle = bgGrad;
  ctx.roundRect(0, 0, W, H, 16);
  ctx.fill();
  
  // Grid pattern
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  
  // Glow circle
  const radGrad = ctx.createRadialGradient(W*0.15, H*0.5, 10, W*0.15, H*0.5, 120);
  radGrad.addColorStop(0, 'rgba(0,255,136,0.12)');
  radGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = radGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Border
  ctx.strokeStyle = 'rgba(0,255,136,0.4)';
  ctx.lineWidth = 1.5;
  ctx.roundRect(2, 2, W-4, H-4, 14);
  ctx.stroke();
  
  // Trophy icon area
  ctx.fillStyle = 'rgba(0,255,136,0.1)';
  ctx.roundRect(24, H/2-40, 80, 80, 12);
  ctx.fill();
  
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 36px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🏆', 64, H/2 + 14);
  
  // Badge label
  ctx.fillStyle = 'rgba(0,255,136,0.8)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('CYBERPREP PRO', 120, 40);
  
  ctx.fillStyle = 'rgba(0,212,255,0.6)';
  ctx.fillText(`// ${planName} CERTIFICATION TRACK`, 120, 60);
  
  // Day Completed
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 32px monospace';
  ctx.fillText(`Day ${dayNumber} Completed`, 120, 110);
  
  // Topic
  ctx.fillStyle = '#e0f0ff';
  ctx.font = '14px sans-serif';
  const shortTitle = topicTitle.length > 45 ? topicTitle.substring(0, 42) + '...' : topicTitle;
  ctx.fillText(shortTitle, 120, 140);
  
  // User name
  ctx.fillStyle = 'rgba(0,255,136,0.9)';
  ctx.font = 'bold 13px monospace';
  ctx.fillText(userName, 120, 175);
  
  // Date
  ctx.fillStyle = 'rgba(120,154,181,0.7)';
  ctx.font = '11px monospace';
  ctx.fillText(formatDate(date), 120, 200);
  
  // Bottom divider
  ctx.strokeStyle = 'rgba(0,255,136,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(24, H-50); ctx.lineTo(W-24, H-50); ctx.stroke();
  
  // Footer
  ctx.fillStyle = 'rgba(0,255,136,0.5)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('cyberprep.pro  |  #CyberSecurity #CEH #CNSP #EthicalHacking', W/2, H-24);
}

function launchConfetti() {
  const colors = ['#00ff88','#00d4ff','#a855f7','#f59e0b','#ff6b35','#ff4444'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');

    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: ${Math.random() * -20}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${5 + Math.random() * 10}px;
      height: ${5 + Math.random() * 10}px;
      animation-delay: ${Math.random() * 2}s;
      animation-duration: ${2 + Math.random() * 2}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

// ===================================================================
// PROGRESS PAGE
// ===================================================================

async function renderProgress() {
  setTopbar('My Progress', 'Analytics / <span>Progress</span>');
  $('contentArea').innerHTML = `<div class="empty-state"><div class="loader-ring" style="margin:0 auto"></div></div>`;
  
  try {
    const [stats, allPlans] = await Promise.all([
      api('GET', '/plans/stats/dashboard'),
      api('GET', '/plans')
    ]);
    
    const ceh = allPlans.find(p => p.plan_name === 'CEH');
    const cnsp = allPlans.find(p => p.plan_name === 'CNSP');
    
    // Heatmap data
    let heatData = {};
    try {
      const h = await api('GET', `/topics/stats/heatmap/${currentUser.id}`);
      h.forEach(d => { heatData[d.session_date] = d.count; });
    } catch {}
    
    $('contentArea').innerHTML = `
      <div class="stats-grid mb-24">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(0,255,136,0.1)"><i class="fas fa-check text-green"></i></div>
          <div class="stat-label">Total Completed</div>
          <div class="stat-value text-green">${stats.totalCompleted}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(0,212,255,0.1)"><i class="fas fa-bullseye" style="color:var(--cyan)"></i></div>
          <div class="stat-label">Overall Progress</div>
          <div class="stat-value" style="color:var(--cyan)">${stats.overallProgress}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(255,107,53,0.1)"><i class="fas fa-fire" style="color:var(--orange)"></i></div>
          <div class="stat-label">Streak</div>
          <div class="stat-value" style="color:var(--orange)">${stats.streak} days</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(168,85,247,0.1)"><i class="fas fa-list" style="color:var(--purple)"></i></div>
          <div class="stat-label">Total Topics</div>
          <div class="stat-value" style="color:var(--purple)">${stats.totalTopics}</div>
        </div>
      </div>
      
      <!-- CEH vs CNSP Comparison -->
      <div class="comparison-grid mb-24">
        ${ceh ? `
        <div class="card">
          <div class="section-title mb-16" style="color:var(--green)"><i class="fas fa-shield-halved"></i> CEH Progress</div>
          <div class="progress-header mb-8">
            <span class="text-sm">Completion</span>
            <span class="progress-pct">${ceh.progress}%</span>
          </div>
          <div class="progress-bar-wrap mb-16">
            <div class="progress-bar" style="width:${ceh.progress}%"></div>
          </div>
          <div class="flex gap-20 text-sm">
            <div><span class="text-green">${ceh.completed_topics}</span> <span class="text-dim">Completed</span></div>
            <div><span class="text-dim">${ceh.total_topics - ceh.completed_topics}</span> <span class="text-dim">Remaining</span></div>
          </div>
        </div>` : '<div class="card"><p class="text-dim">No CEH plan found</p></div>'}
        
        ${cnsp ? `
        <div class="card">
          <div class="section-title mb-16" style="color:var(--purple)"><i class="fas fa-network-wired"></i> CNSP Progress</div>
          <div class="progress-header mb-8">
            <span class="text-sm">Completion</span>
            <span class="progress-pct" style="color:var(--purple)">${cnsp.progress}%</span>
          </div>
          <div class="progress-bar-wrap mb-16">
            <div class="progress-bar" style="width:${cnsp.progress}%;background:linear-gradient(90deg,var(--purple),var(--cyan))"></div>
          </div>
          <div class="flex gap-20 text-sm">
            <div><span style="color:var(--purple)">${cnsp.completed_topics}</span> <span class="text-dim">Completed</span></div>
            <div><span class="text-dim">${cnsp.total_topics - cnsp.completed_topics}</span> <span class="text-dim">Remaining</span></div>
          </div>
        </div>` : '<div class="card"><p class="text-dim">No CNSP plan found</p></div>'}
      </div>
      
      <!-- ACTIVITY HEATMAP -->
      <div class="card">
        <div class="section-title mb-20"><i class="fas fa-calendar-days"></i> Study Activity Heatmap</div>
        <div class="heatmap-grid" id="heatmapGrid"></div>
        <div class="flex gap-8 mt-16 items-center text-sm text-dim">
          <span>Less</span>
          <div class="heatmap-cell" style="width:14px;height:14px"></div>
          <div class="heatmap-cell level-1" style="width:14px;height:14px"></div>
          <div class="heatmap-cell level-2" style="width:14px;height:14px"></div>
          <div class="heatmap-cell level-3" style="width:14px;height:14px"></div>
          <div class="heatmap-cell level-4" style="width:14px;height:14px"></div>
          <span>More</span>
        </div>
      </div>
    `;
    
    // Build heatmap
    const heatmapEl = $('heatmapGrid');
    const today = new Date();
    for (let i = 181; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      const count = heatData[dateStr] || 0;
      const level = count === 0 ? 0 : count < 2 ? 1 : count < 4 ? 2 : count < 6 ? 3 : 4;
      const cell = document.createElement('div');
      cell.className = `heatmap-cell ${level > 0 ? 'level-' + level : ''}`;
      cell.title = `${dateStr}: ${count} session(s)`;
      heatmapEl.appendChild(cell);
    }
    
  } catch (e) {
    $('contentArea').innerHTML = `<div class="empty-state"><i class="fas fa-bug"></i><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

// ===================================================================
// ALL NOTES PAGE
// ===================================================================

async function renderAllNotes() {
  setTopbar('All Notes', 'My Notes');
  $('contentArea').innerHTML = `<div class="empty-state"><div class="loader-ring" style="margin:0 auto"></div></div>`;
  
  try {
    const allPlans = await api('GET', '/plans');
    let allTopicsWithNotes = [];
    
    for (const plan of allPlans) {
      const topics = await api('GET', `/topics/plan/${plan.id}`);
      topics.filter(t => t.notes && t.notes.trim()).forEach(t => {
        allTopicsWithNotes.push({ ...t, planName: plan.plan_name });
      });
    }
    
    $('contentArea').innerHTML = `
      <div class="section-header mb-20">
        <div class="section-title"><i class="fas fa-note-sticky"></i> All Notes (${allTopicsWithNotes.length})</div>
      </div>
      
      ${allTopicsWithNotes.length === 0 ? 
        `<div class="empty-state"><i class="fas fa-note-sticky"></i><h3>No notes yet</h3><p>Open a topic and start writing notes!</p></div>` :
        `<div style="display:flex;flex-direction:column;gap:16px">
          ${allTopicsWithNotes.map(t => `
            <div class="card" onclick="openTopic(${t.id})" style="cursor:pointer">
              <div class="flex items-center gap-12 mb-12">
                <span class="tag ${t.planName === 'CEH' ? 'tag-green' : 'tag-purple'}">${t.planName}</span>
                <span class="mono text-dim text-xs">DAY ${t.day_number}</span>
                <span class="text-sm font-bold">${t.topic_title}</span>
              </div>
              <div class="text-sm text-dim" style="white-space:pre-line;max-height:80px;overflow:hidden">${t.notes}</div>
              <div class="text-xs text-dim mt-8"><i class="fas fa-arrow-right"></i> Click to open topic</div>
            </div>
          `).join('')}
        </div>`
      }
    `;
  } catch (e) {
    $('contentArea').innerHTML = `<div class="empty-state"><i class="fas fa-bug"></i><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

// ===================================================================
// PLANS PAGE
// ===================================================================

async function renderPlansPage() {
  setTopbar('All Plans', 'Plans');
  $('contentArea').innerHTML = `<div class="empty-state"><div class="loader-ring" style="margin:0 auto"></div></div>`;
  
  try {
    const allPlans = await api('GET', '/plans');
    plans = allPlans;
    
    $('contentArea').innerHTML = `
      <div class="section-header mb-20">
        <div class="section-title"><i class="fas fa-folder-open"></i> All Plans</div>
        <button class="btn btn-primary btn-sm" onclick="showCreatePlanModal()"><i class="fas fa-plus"></i> New Plan</button>
      </div>
      <div class="plans-grid">
        ${allPlans.map(renderPlanCard).join('')}
      </div>
    `;

  }
}

// ===================================================================
// MODALS
// ===================================================================

function showCreatePlanModal() {
  $('genericModalTitle').textContent = 'Create New Plan';
  $('genericModalBody').innerHTML = `
    <div class="form-group">
      <label class="form-label">Plan Name</label>
      <input class="form-input" id="newPlanName" placeholder="e.g., OSCP, CompTIA Security+" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="newPlanDesc" placeholder="Brief description of this plan">
    </div>
    <div class="form-group">
      <label class="form-label">Total Days</label>
      <input class="form-input" id="newPlanDays" type="number" value="30" min="1" max="365">
    </div>
  `;
  $('genericModalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeGenericModal()">Cancel</button>
    <button class="btn btn-primary" onclick="doCreatePlan()"><i class="fas fa-plus"></i> Create Plan</button>
  `;
  $('genericModal').classList.add('open');
  setTimeout(() => $('newPlanName')?.focus(), 100);
}

async function doCreatePlan() {
  const name = $('newPlanName').value.trim();
  const desc = $('newPlanDesc').value.trim();
  const days = parseInt($('newPlanDays').value) || 30;
  
  if (!name) { toast('Plan name required', 'warning'); return; }
  
  try {
    await api('POST', '/plans', { plan_name: name, description: desc, total_days: days });
    closeGenericModal();
    toast('Plan created!', 'success');
    await renderDashboard();
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

function showAddTopicModal(planId) {
  $('genericModalTitle').textContent = 'Add New Topic';
  $('genericModalBody').innerHTML = `
    <div class="form-group">
      <label class="form-label">Day Number</label>
      <input class="form-input" id="newTopicDay" type="number" min="1" value="1">
    </div>
    <div class="form-group">
      <label class="form-label">Topic Title</label>
      <input class="form-input" id="newTopicTitle" placeholder="e.g., Network Scanning Techniques" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Subtopics (one per line)</label>
      <textarea class="form-input" id="newTopicSubs" rows="5" placeholder="Nmap Basics&#10;Port Scanning&#10;OS Detection"></textarea>
    </div>
  `;
  $('genericModalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeGenericModal()">Cancel</button>
    <button class="btn btn-primary" onclick="doAddTopic(${planId})"><i class="fas fa-plus"></i> Add Topic</button>
  `;
  $('genericModal').classList.add('open');
}

async function doAddTopic(planId) {
  const day = parseInt($('newTopicDay').value) || 1;
  const title = $('newTopicTitle').value.trim();
  const subsRaw = $('newTopicSubs').value;
  const subs = subsRaw.split('\n').map(s => s.trim()).filter(Boolean);
  
  if (!title) { toast('Topic title required', 'warning'); return; }
  
  try {
    const result = await api('POST', '/topics', { plan_id: planId, day_number: day, topic_title: title, subtopics: subs });
    closeGenericModal();
    toast('Topic added!', 'success');
    const plan = plans.find(p => p.id === planId);
    if (plan) await renderPlanPage(plan.plan_name);
  } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

function closeGenericModal() {
  $('genericModal').classList.remove('open');
}

// Click outside to close modals
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});

// ===================================================================
// START APP
// ===================================================================

init();
</script>
</body>
